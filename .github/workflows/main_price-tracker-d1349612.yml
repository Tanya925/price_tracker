name: Build and deploy Node.js app to Azure Web App - price-tracker-d1349612

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upload source code for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules
            !node_modules/**
            !.git
            !.git/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_01AEEE569FFF4BFEB60D74963389616D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4D6C2AE9C71D4494BFDDCB7E86F92198 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EB985F5F09394C8691E696E1AF0434A9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'price-tracker-d1349612'
          slot-name: 'Production'
          package: .
          # Enable remote build to ensure native modules like sqlite3 are compiled on the target environment
          # to avoid GLIBC version mismatch (e.g., GLIBC_2.38 not found).
          app-settings-json: '[{"name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true", "slotSetting": false}]'